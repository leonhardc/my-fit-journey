{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - My Fit Journey</title>
    <link rel="stylesheet" href="{% static 'styles/cadastro.css' %}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Criar Conta</h1>
            <p>Comece sua jornada fitness agora</p>
        </div>

        <form action="/cadastro" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div class="form-group">
                <label for="sobrenome">Sobrenome</label>
                <input type="text" id="sobrenome" name="sobrenome" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" name="telefone">
            </div>

            <div class="form-group">
                <label for="data_nascimento">Data de Nascimento</label>
                <input type="date" id="data_nascimento" name="data_nascimento">
            </div>

            <div class="form-group">
                <label for="objetivo">Objetivo</label>
                <select id="objetivo" name="objetivo">
                    <option value="">Selecione um objetivo</option>
                    <option value="perder_peso">Perder Peso</option>
                    <option value="ganhar_massa">Ganhar Massa Muscular</option>
                    <option value="saude">Melhorar Saúde</option>
                    <option value="resistencia">Aumentar Resistência</option>
                </select>
            </div>

            <div class="password-group">
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>
                <div class="form-group">
                    <label for="confirmar_senha">Confirmar Senha</label>
                    <input type="password" id="confirmar_senha" name="confirmar_senha" required>
                </div>
            </div>

            <button type="submit" class="btn">Cadastrar</button>
        </form>

        <div class="footer">
            Já tem uma conta? <a href="/login">Fazer login</a>
        </div>
    </div>
</body>
</html>
