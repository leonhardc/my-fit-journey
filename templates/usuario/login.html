{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - My Fit Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="w-full max-w-md">
            <div class="bg-gray-800 rounded-lg shadow-lg p-8">
                <div class="text-center mb-8">
                    <h1 class="text-4xl font-bold text-white mb-2">My Fit Journey</h1>
                    <p class="text-gray-400">Acesse sua conta</p>
                </div>

                <form method="POST" action="{% url 'usuario:login' %}" class="space-y-6">
                    {% csrf_token %}
                    <div>
                        <label for="usuario" class="block text-sm font-medium text-gray-300 mb-2">Usuário</label>
                        <input type="text" id="usuario" name="usuario" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500">
                    </div>

                    <div>
                        <label for="senha" class="block text-sm font-medium text-gray-300 mb-2">Senha</label>
                        <input type="password" id="senha" name="senha" required class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500">
                    </div>

                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">Entrar</button>
                </form>

                <div class="text-center mt-6">
                    <p class="text-gray-400">Não tem conta? <a href="{% url 'usuario:cadastro' %}" class="text-blue-500 hover:text-blue-400">Crie uma agora</a></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
